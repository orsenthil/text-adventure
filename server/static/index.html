<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>The Odyssey — An Interactive Story</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
  <style>
    html, body {
      margin: 0;
      height: 100%;
      background: #000;
    }
    #terminal {
      width: 100%;
      height: 100%;
      padding: 8px;
      box-sizing: border-box;
    }
    #feedback-link {
      position: fixed;
      bottom: 16px;
      right: 16px;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #222;
      color: #eee;
      border: 1px solid #555;
      font: bold 18px/40px sans-serif;
      text-align: center;
      text-decoration: none;
      z-index: 10;
    }
    #feedback-link:hover {
      background: #333;
    }
    #font-controls {
      position: fixed;
      bottom: 16px;
      left: 16px;
      display: flex;
      gap: 6px;
      z-index: 10;
    }
    #font-controls button {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: #222;
      color: #eee;
      border: 1px solid #555;
      font: bold 16px/1 sans-serif;
      cursor: pointer;
    }
    #font-controls button:hover {
      background: #333;
    }
  </style>
</head>
<body>
  <div id="terminal"></div>
  <div id="font-controls">
    <button id="font-dec" title="Decrease text size">A−</button>
    <button id="font-inc" title="Increase text size">A+</button>
  </div>
  <a
    id="feedback-link"
    href="https://github.com/orsenthil/text-adventure/issues"
    target="_blank"
    rel="noopener noreferrer"
    title="Feedback or bug report"
  >?</a>
  <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
  <script>
    const MIN_FONT_SIZE = 8;
    const MAX_FONT_SIZE = 24;

    function fontSizeForWidth(width) {
      if (width < 480) return 10;
      if (width < 768) return 12;
      return 14;
    }

    let fontSize = fontSizeForWidth(window.innerWidth);
    let userSetFont = false;

    const term = new Terminal({
      cursorBlink: true,
      convertEol: true,
      scrollback: 5000,
      fontSize,
    });
    const fitAddon = new FitAddon.FitAddon();
    term.loadAddon(fitAddon);
    term.open(document.getElementById("terminal"));
    fitAddon.fit();

    const proto = location.protocol === "https:" ? "wss" : "ws";
    const socket = new WebSocket(`${proto}://${location.host}/ws`);
    socket.binaryType = "arraybuffer";

    const RESIZE_PREFIX = "\x01";
    function sendResize() {
      if (socket.readyState === WebSocket.OPEN) {
        socket.send(RESIZE_PREFIX + JSON.stringify({ rows: term.rows, cols: term.cols }));
      }
    }
    socket.onopen = () => sendResize();
    term.onResize(() => sendResize());

    function applyFontSize(size) {
      fontSize = Math.max(MIN_FONT_SIZE, Math.min(MAX_FONT_SIZE, size));
      term.options.fontSize = fontSize;
      fitAddon.fit();
    }

    document.getElementById("font-inc").addEventListener("click", () => {
      userSetFont = true;
      applyFontSize(fontSize + 2);
    });
    document.getElementById("font-dec").addEventListener("click", () => {
      userSetFont = true;
      applyFontSize(fontSize - 2);
    });

    function refit() {
      if (!userSetFont) {
        fontSize = fontSizeForWidth(window.innerWidth);
        term.options.fontSize = fontSize;
      }
      fitAddon.fit();
    }
    window.addEventListener("resize", refit);
    window.addEventListener("orientationchange", refit);

    socket.onmessage = (event) => {
      term.write(new Uint8Array(event.data));
    };
    socket.onclose = () => {
      term.write("\r\n\r\n[connection closed]\r\n");
    };

    term.onData((data) => {
      if (socket.readyState === WebSocket.OPEN) {
        socket.send(data);
      }
    });
  </script>
</body>
</html>
